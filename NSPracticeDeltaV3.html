function executePreset() {
    if (event.key === "Enter") {
        const code = presetSetting.value;

        const posChar = code[0];
        const sizeChar = code.substring(1, 3); // 1, 2
        const submitChar = code[3];
        const bgChar = "#" + code.substring(4, 10); // 4, 5, 6, 7, 8, 9
        const textChar = "#" + code.substring(10, 16); // 10, 11, 12, 13, 14, 15

        // position
        testContainer.classList.remove("left", "mid", "right");
        if (posChar === "l") {
            testContainer.classList.add("left");
            positionSetting.value = "left"; // visually changes setting
            console.log(`Added class left to testContainer`);
        }
        if (posChar === "m") {
            testContainer.classList.add("mid");
            positionSetting.value = "mid"; // visually changes setting
            console.log(`Added class mid to testContainer`);
        }
        if (posChar === "r") {
            testContainer.classList.add("right");
            positionSetting.value = "right"; // visually changes setting
            console.log(`Added class right to testContainer`);
        }

        // font size
        fontSize = sizeChar + "px";
        fontSizeSetting.value = sizeChar;
        console.log(`Changed variable fontSize to ${fontSize}`);
        fontSizeText.style.fontSize = fontSize;
        fontSizeText.innerText = `Font Size: ${fontSize}`;

        // disable submit button
        if (submitChar === "0") {
            disableSubmitValue = false;
            disableSubmitSetting.checked = false;
        } else {
            disableSubmitValue = true;
            disableSubmitSetting.checked = true;
        }

        // background color
        bgColorSetting.value = bgChar;
        document.body.style.backgroundColor = bgChar;
        topbarContainer.style.backgroundColor = bgChar;
        console.log(`Changed background color to ${bgChar}`);
        // convert Hex to RGB
        const r = parseInt(bgChar.substring(1, 3), 16);
        const g = parseInt(bgChar.substring(3, 5), 16);
        const b = parseInt(bgChar.substring(5, 7), 16);

        // calculate brightness (YIQ formula)
        const brightness = ((r * 299) + (g * 587) + (b * 114)) / 1000;

        if (brightness > 128) {
            mainMenuContainer.style.color = "black";
            topbarContainer.style.borderBottom = "1px solid black";
        } else {
            mainMenuContainer.style.color = "white";
            topbarContainer.style.borderBottom = "1px solid white";
        }

        // text color
        textColor = textChar;
        console.log(`Changed variable textColor to ${textColor}`);
        fontSizeText.style.color = textColor;
    }
}

}

        el.style.border = "2px solid white";

}

// MATH HELPER FUNCTIONS

function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function lcm(a, b) {
    return a * b / gcd(a, b);
}

function gcd(a, b) {
    return b === 0 ? a : gcd(b, a % b);
}

function simplifyFraction(obj) {
    let d = gcd(obj.numerator, obj.denominator);
    return {
        numerator: obj.numerator / d,
        denominator: obj.denominator / d
    };
}

function simplifyMixed(w, n, d) {
    let simple = simplifyFraction({ numerator: n, denominator: d });
    let overflowWhole = Math.floor(simple.numerator / simple.denominator);
    let finalNumerator = simple.numerator % simple.denominator;
    return {
        whole: w + overflowWhole,
        numerator: finalNumerator,
        denominator: simple.denominator,
    };
}

function roundTo(num, places) {
    return Math.round(num * 10 ** places) / 10 ** places;

function arabicToRoman(num) {
    let result = "";
    for (let { value, numeral } of romanMap) {
        while (num >= value) {
        result += numeral;
        num -= value;
        }
    }
    return result;
}

function romanToArabic(str) {
    let total = 0;
    let prev = 0;
    for (let i = str.length - 1; i >= 0; i--) {
        let current = romanValues[str[i]];
        if (current < prev) {
        total -= current; // e.g. IV = 5 - 1
        } else {
        total += current;
        }
        prev = current;
    }
    return total;
}

function simplifyFraction(object) {
    let common = gcd(object.numerator, object.denominator);
    return {
        numerator: object.numerator / common,
        denominator: object.denominator / common,

function finish() {
    let endTime = Date.now();
    let totalTime = (endTime - startTime) / 1000;
    let average = totalTime / questionAmount;

    let averageMinutes = 0;
    let totalTimeMinutes = 0;

    // puts average in minutes and seconds
    while (average >= 60) {
        averageMinutes += 1;
        average -= 60;
    }

    // puts total time in minutes and seconds
    while (totalTime >= 60) {
        totalTimeMinutes += 1;
        totalTime -= 60;
    }

    addText(`Score: ${score}`, testContainer, fontSize, textColor);

    if (averageMinutes === 0) {
        addText(`Average Time: ${roundTo(average, 3)} seconds`, testContainer, fontSize, textColor);
    } else if (average < 10) {
        addText(`Average Time: ${averageMinutes} : 0${roundTo(average, 3)}`, testContainer, fontSize, textColor);
    } else {
        addText(`Average Time: ${averageMinutes} : ${roundTo(average, 3)}`, testContainer, fontSize, textColor);
    }

    if (totalTimeMinutes === 0) {
        addText(`Total Time: ${roundTo(totalTime, 3)}`, testContainer, fontSize, textColor);
    } else if (totalTime < 10) {
        addText(`Total Time: ${totalTimeMinutes} : 0${roundTo(totalTime, 3)}`, testContainer, fontSize, textColor);
    } else {
        addText(`Total Time: ${totalTimeMinutes} : ${roundTo(totalTime, 3)}`, testContainer, fontSize, textColor);
    }

    // Scroll to bottom
    window.scrollTo(0, testContainer.scrollHeight);

    // Move focus away so nothing blinks
    document.activeElement.blur();
}
